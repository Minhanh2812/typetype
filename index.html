<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typewriter Pro - Infinite Edition</title>
    <style>
        /* TOГҖN Bб»ҳ GIAO DIб»ҶN */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #FFDDEE; 
            font-family: 'Courier New', Courier, monospace;
            overflow-y: auto; /* Cho phГ©p cuб»ҷn trang khi giбәҘy dГ i ra */
            min-height: 100vh;
            padding-bottom: 380px; /* KhoбәЈng trб»‘ng Д‘б»ғ khГҙng bб»Ӣ bГ n phГӯm che mбәҘt chб»Ҝ cuб»‘i */
        }

        /* KHб»” GIбәӨY VГ” Hбә N */
        .paper-zone { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px; 
        }

        #paper { 
            background: #f4f1ea; 
            width: 95%; 
            max-width: 900px; 
            min-height: 600px; 
            height: auto; /* GiбәҘy tб»ұ kГ©o dГ i vГҙ hбәЎn theo nб»ҷi dung */
            padding: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            outline: none; 
            font-size: 24px; 
            line-height: 1.6; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            color: #333;
        }

        /* KHUNG ДҗEN BГҖN PHГҚM Cб»җ Дҗб»ҠNH */
        .kb-fixed { 
            background: #111; 
            padding: 20px 10px 45px 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
            z-index: 9999;
        }

        .row { display: flex; justify-content: center; margin: 8px 0; gap: 10px; width: 100%; }

        /* CГҒC PHГҚM Bб»° VГҖ CГӮN Дҗб»җI */
        .key { 
            width: clamp(45px, 9vw, 75px); 
            height: clamp(55px, 11vw, 85px); 
            background: #333; 
            color: white; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-bottom: 6px solid #000; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: clamp(18px, 4vw, 26px); 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            transition: all 0.05s;
        }

        .key:active { transform: translateY(4px); border-bottom-width: 1px; background: #444; }
        
        /* PHГҚM CHб»ЁC NДӮNG */
        .wide { width: clamp(90px, 18vw, 140px); background: #444; font-size: 16px; }
        .space { width: clamp(250px, 45vw, 650px); }
        .enter { background: #e67e22; width: clamp(120px, 22vw, 180px); }
        .save { background: #27ae60; width: clamp(90px, 18vw, 140px); }
        .active { background: #ff88aa !important; color: #000 !important; }

        /* Lб»ҡP PHб»Ұ LГҖM Mб»ң GIГҡP CHб»® CUб»ҳN MЖҜб»ўT DЖҜб»ҡI PHГҚM */
        .fade-bottom {
            position: fixed;
            bottom: 350px;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, #FFDDEE);
            pointer-events: none;
            z-index: 500;
        }
    </style>
</head>
<body>

    <div class="paper-zone">
        <div id="paper" contenteditable="true" spellcheck="false" autofocus></div>
    </div>

    <div class="fade-bottom"></div>

    <div class="kb-fixed">
        <div id="kb-inner" style="width: 100%;"></div>
    </div>

    <script>
        const paper = document.getElementById('paper');
        const kbInner = document.getElementById('kb-inner');
        let isNum = false;
        let isCaps = false;

        const layouts = {
            abc: [
                ['q','w','e','r','t','y','u','i','o','p'],
                ['a','s','d','f','g','h','j','k','l'],
                ['z','x','c','v','b','n','m','вҢ«']
            ],
            num: [
                ['1','2','3','4','5','6','7','8','9','0'],
                ['!','@','#','$','%','^','&','*','(',')'],
                ['-','/',':',';','?','.',',','+','=','вҢ«']
            ]
        };

        function render() {
            kbInner.innerHTML = '';
            const rows = isNum ? layouts.num : layouts.abc;

            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                row.forEach(k => {
                    const btn = document.createElement('div');
                    btn.className = `key ${k === 'вҢ«' ? 'wide' : ''}`;
                    btn.innerText = (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
                    
                    const press = (e) => { e.preventDefault(); handle(k); };
                    btn.addEventListener('touchstart', press, {passive: false});
                    btn.addEventListener('mousedown', press);
                    rowDiv.appendChild(btn);
                });
                kbInner.appendChild(rowDiv);
            });

            const footer = document.createElement('div');
            footer.className = 'row';
            footer.innerHTML = `
                <div class="key wide" id="m-btn">${isNum ? 'ABC' : '123'}</div>
                <div class="key wide ${isCaps ? 'active' : ''}" id="c-btn">CAPS</div>
                <div class="key space">SPACE</div>
                <div class="key enter">RETURN</div>
                <div class="key save">SAVE</div>
            `;
            kbInner.appendChild(footer);

            document.getElementById('m-btn').onclick = () => { isNum = !isNum; render(); };
            document.getElementById('c-btn').onclick = () => { isCaps = !isCaps; render(); };
            document.querySelector('.space').onclick = () => handle(' ');
            document.querySelector('.enter').onclick = () => handle('Enter');
            document.querySelector('.save').onclick = () => {
                const blob = new Blob([paper.innerText], {type: 'text/plain'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); 
                a.download = 'typing_note.txt'; 
                a.click();
            };
        }

        function handle(k) {
            if (k === 'вҢ«') {
                paper.innerText = paper.innerText.slice(0, -1);
            } else if (k === 'Enter') {
                paper.innerHTML += '<br>';
            } else if (k === ' ') {
                paper.innerHTML += '\u00A0';
            } else {
                paper.innerText += (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
            }
            
            // Гүp trang web cuб»ҷn xuб»‘ng khi gГө dГІng mб»ӣi
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }

        window.onload = render;
    </script>
</body>
</html>
