<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typewriter Reborn</title>
    <style>
        /* CSS Gộp - Đảm bảo không bị lỗi hiển thị code */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #FFDDEE; font-family: 'Courier New', monospace; overflow-y: auto; min-height: 100vh; padding-bottom: 25vh; }

        /* GIẤY VÔ HẠN */
        .paper-zone { width: 100%; display: flex; justify-content: center; padding: 20px 0; }
        #paper { 
            background: #f4f1ea; width: 90%; max-width: 800px; min-height: 500px; height: auto !important; 
            padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); outline: none; 
            font-size: 22px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; 
        }

        /* BÀN PHÍM HẠ XUỐNG 25% MÀN HÌNH */
.kb-fixed { 
    background: #111; 
    position: fixed; 
    bottom: 0; 
    left: 0; 
    width: 100%; 
    height: 25vh !important; /* Hạ xuống đúng 25% chiều cao trang */
    min-height: 200px; 
    padding: 10px 15px;
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center;
    z-index: 9999; 
    box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
}

.row { 
    display: flex; 
    justify-content: center; 
    margin: 4px 0; 
    gap: 8px; /* Khoảng cách giữa các phím */
    width: 100%; 
}

/* PHÍM GỌN LẠI VÀ FONT CHỮ TO RA */
.key { 
    /* Chiều rộng phím nhỏ lại một chút để không bị dính sát nhau */
    width: clamp(40px, 8vw, 60px); 
    /* Chiều cao phím dẹt xuống để vừa khung 25% */
    height: clamp(45px, 5vh, 55px); 
    background: #333; 
    color: white; 
    border-radius: 8px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    border-bottom: 4px solid #000; 
    cursor: pointer; 
    font-weight: bold; 
    /* FONT CHỮ TO RA CHO DỄ NHÌN */
    font-size: 22px !important; 
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

.key:active { transform: translateY(3px); border-bottom-width: 1px; }

/* ĐIỀU CHỈNH CÁC NÚT CHỨC NĂNG CHO CÂN ĐỐI */
.wide { width: clamp(80px, 15vw, 110px); background: #444; font-size: 16px !important; }
.space { width: clamp(200px, 40vw, 500px); }
.enter { background: #e67e22; width: clamp(120px, 20vw, 180px); font-size: 16px !important; }
.active { background: #ff88aa !important; color: #000 !important; }
    </style>
</head>
<body>

    <div class="paper-zone"><div id="paper" contenteditable="true" spellcheck="false"></div></div>
    <div class="kb-fixed"><div id="kb-inner" style="width:100%"></div></div>

    <script>
        const paper = document.getElementById('paper');
        const kbInner = document.getElementById('kb-inner');
        let isNum = false; let isCaps = false;

        const layouts = {
            abc: [['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['z','x','c','v','b','n','m','⌫']],
            num: [['1','2','3','4','5','6','7','8','9','0'],['!','@','#','$','%','^','&','*','(',')'],['-','/',':',';','?','.',',','+','=','⌫']]
        };

        function render() {
            kbInner.innerHTML = '';
            const rows = isNum ? layouts.num : layouts.abc;
            rows.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'row';
                row.forEach(k => {
                    const btn = document.createElement('div'); btn.className = `key ${k === '⌫' ? 'wide' : ''}`;
                    btn.innerText = (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
                    btn.onmousedown = (e) => { e.preventDefault(); handle(k); };
                    rowDiv.appendChild(btn);
                });
                kbInner.appendChild(rowDiv);
            });
            const foot = document.createElement('div'); foot.className = 'row';
            foot.innerHTML = `<div class="key wide" id="m-btn">${isNum?'ABC':'123'}</div><div class="key wide ${isCaps?'active':''}" id="c-btn">CAPS</div><div class="key space">SPACE</div><div class="key enter">RETURN</div>`;
            kbInner.appendChild(foot);
            document.getElementById('m-btn').onclick = () => { isNum = !isNum; render(); };
            document.getElementById('c-btn').onclick = () => { isCaps = !isCaps; render(); };
            document.querySelector('.space').onclick = () => handle(' ');
            document.querySelector('.enter').onclick = () => handle('Enter');
        }

        function handle(k) {
            if (k === '⌫') paper.innerText = paper.innerText.slice(0, -1);
            else if (k === 'Enter') paper.innerHTML += '<br>';
            else if (k === ' ') paper.innerHTML += '\u00A0';
            else paper.innerText += (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
            window.scrollTo(0, document.body.scrollHeight);
        }
        window.onload = render;
    </script>
</body>
</html>
