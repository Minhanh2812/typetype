<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typewriter Pro - Final</title>
    <style>
        /* CSS GỘP VÀO ĐÂY */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #FFDDEE; font-family: 'Courier New', Courier, monospace; }
        
        .container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        /* VÙNG GIẤY */
        .paper-zone { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 20px; }
        #paper { 
            background: #f4f1ea; width: 95%; max-width: 800px; min-height: 100%; 
            padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); outline: none; 
            font-size: 22px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word;
        }

        /* VÙNG BÀN PHÍM */
        .kb-zone { background: #111; padding: 10px 5px 30px 5px; display: flex; flex-direction: column; align-items: center; }
        .row { display: flex; justify-content: center; margin: 4px 0; gap: 5px; width: 100%; }
        .key { 
            width: clamp(33px, 8vw, 55px); height: clamp(45px, 10vw, 60px);
            background: #333; color: white; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 4px solid #000; cursor: pointer; font-weight: bold; font-size: 18px;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .key:active { transform: translateY(2px); border-bottom-width: 1px; background: #444; }
        
        .wide { width: clamp(70px, 15vw, 100px); background: #444; font-size: 14px; }
        .space { width: clamp(150px, 35vw, 400px); }
        .enter { background: #e67e22; width: clamp(90px, 20vw, 130px); }
        .save { background: #27ae60; width: clamp(70px, 15vw, 100px); }
        .active { background: #ff88aa !important; color: #000 !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="paper-zone">
            <div id="paper" contenteditable="true" spellcheck="false" autofocus></div>
        </div>

        <div class="kb-zone">
            <div id="kb-inner" style="width: 100%;"></div>
        </div>
    </div>

    <script>
        /* JAVASCRIPT GỘP VÀO ĐÂY */
        const paper = document.getElementById('paper');
        const kbInner = document.getElementById('kb-inner');
        let isNum = false;
        let isCaps = false;

        const layouts = {
            abc: [
                ['q','w','e','r','t','y','u','i','o','p'],
                ['a','s','d','f','g','h','j','k','l'],
                ['z','x','c','v','b','n','m','⌫']
            ],
            num: [
                ['1','2','3','4','5','6','7','8','9','0'],
                ['!','@','#','$','%','^','&','*','(',')'],
                ['-','/',':',';','?','.',',','+','=','⌫']
            ]
        };

        function render() {
            kbInner.innerHTML = '';
            const rows = isNum ? layouts.num : layouts.abc;

            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                row.forEach(k => {
                    const btn = document.createElement('div');
                    btn.className = `key ${k === '⌫' ? 'wide' : ''}`;
                    btn.innerText = (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
                    
                    const press = (e) => { e.preventDefault(); handle(k); };
                    btn.addEventListener('touchstart', press, {passive: false});
                    btn.addEventListener('mousedown', press);
                    rowDiv.appendChild(btn);
                });
                kbInner.appendChild(rowDiv);
            });

            const footer = document.createElement('div');
            footer.className = 'row';
            footer.innerHTML = `
                <div class="key wide" id="m-btn">${isNum ? 'ABC' : '123'}</div>
                <div class="key wide ${isCaps ? 'active' : ''}" id="c-btn">CAPS</div>
                <div class="key space">SPACE</div>
                <div class="key enter">RETURN</div>
                <div class="key save">SAVE</div>
            `;
            kbInner.appendChild(footer);

            document.getElementById('m-btn').onclick = () => { isNum = !isNum; render(); };
            document.getElementById('c-btn').onclick = () => { isCaps = !isCaps; render(); };
            document.querySelector('.space').onclick = () => handle(' ');
            document.querySelector('.enter').onclick = () => handle('Enter');
            document.querySelector('.save').onclick = () => {
                const blob = new Blob([paper.innerText], {type: 'text/plain'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = 'note.txt'; a.click();
            };
        }

        function handle(k) {
            if (k === '⌫') paper.innerText = paper.innerText.slice(0, -1);
            else if (k === 'Enter') paper.innerHTML += '<br>';
            else if (k === ' ') paper.innerHTML += '\u00A0';
            else {
                paper.innerText += (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
            }
            document.querySelector('.paper-zone').scrollTop = 99999;
        }

        window.onload = render;
    </script>
</body>
</html>
