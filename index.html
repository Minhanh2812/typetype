<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typewriter Reborn</title>
    <style>
        /* CSS Gб»™p - ДђбєЈm bбєЈo khГґng bб»‹ lб»—i hiб»ѓn thб»‹ code */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #FFDDEE; font-family: 'Courier New', monospace; overflow-y: auto; min-height: 100vh; padding-bottom: 25vh; }

        /* GIбє¤Y VГ” Hбє N */
        .paper-zone { width: 100%; display: flex; justify-content: center; padding: 20px 0; }
        #paper { 
            background: #f4f1ea; width: 90%; max-width: 800px; min-height: 500px; height: auto !important; 
            padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); outline: none; 
            font-size: 22px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; 
        }

        /* BГЂN PHГЌM 1/4 TRANG (25vh) */
        .kb-fixed { 
            background: #111; position: fixed; bottom: 0; left: 0; width: 100%; 
            height: 35vh; min-height: 250px; padding: 20px 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .row { display: flex; justify-content: center; margin: 3px 0; gap: 5px; width: 100%; }
        .key { 
            width: clamp(35px, 8vw, 55px); height: clamp(40px, 5vh, 50px);
            background: #333; color: white; border-radius: 6px; display: flex; 
            align-items: center; justify-content: center; border-bottom: 3px solid #000; 
            cursor: pointer; font-weight: bold; font-size: 18px; user-select: none;
        }
        .key:active { transform: translateY(2px); border-bottom-width: 1px; }

        /* NГєt chб»©c nДѓng */
        .wide { width: clamp(70px, 14vw, 100px); background: #444; font-size: 14px; }
        .space { width: clamp(160px, 35vw, 450px); }
        .enter { background: #e67e22; width: clamp(90px, 18vw, 140px); }
        .active { background: #ff88aa !important; color: #000 !important; }
    </style>
</head>
<body>

    <div class="paper-zone"><div id="paper" contenteditable="true" spellcheck="false"></div></div>
    <div class="kb-fixed"><div id="kb-inner" style="width:100%"></div></div>

    <script>
        const paper = document.getElementById('paper');
        const kbInner = document.getElementById('kb-inner');
        let isNum = false; let isCaps = false;

        const layouts = {
            abc: [['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['z','x','c','v','b','n','m','вЊ«']],
            num: [['1','2','3','4','5','6','7','8','9','0'],['!','@','#','$','%','^','&','*','(',')'],['-','/',':',';','?','.',',','+','=','вЊ«']]
        };

        function render() {
            kbInner.innerHTML = '';
            const rows = isNum ? layouts.num : layouts.abc;
            rows.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'row';
                row.forEach(k => {
                    const btn = document.createElement('div'); btn.className = `key ${k === 'вЊ«' ? 'wide' : ''}`;
                    btn.innerText = (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
                    btn.onmousedown = (e) => { e.preventDefault(); handle(k); };
                    rowDiv.appendChild(btn);
                });
                kbInner.appendChild(rowDiv);
            });
            const foot = document.createElement('div'); foot.className = 'row';
            foot.innerHTML = `<div class="key wide" id="m-btn">${isNum?'ABC':'123'}</div><div class="key wide ${isCaps?'active':''}" id="c-btn">CAPS</div><div class="key space">SPACE</div><div class="key enter">RETURN</div>`;
            kbInner.appendChild(foot);
            document.getElementById('m-btn').onclick = () => { isNum = !isNum; render(); };
            document.getElementById('c-btn').onclick = () => { isCaps = !isCaps; render(); };
            document.querySelector('.space').onclick = () => handle(' ');
            document.querySelector('.enter').onclick = () => handle('Enter');
        }

        function handle(k) {
            if (k === 'вЊ«') paper.innerText = paper.innerText.slice(0, -1);
            else if (k === 'Enter') paper.innerHTML += '<br>';
            else if (k === ' ') paper.innerHTML += '\u00A0';
            else paper.innerText += (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
            window.scrollTo(0, document.body.scrollHeight);
        }
        window.onload = render;
    </script>
</body>
</html>
