<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typewriter Pro 3D - Final</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #FFDDEE; 
            font-family: 'Courier New', monospace; 
            overflow-y: auto; 
            min-height: 100vh; 
            padding-bottom: 45vh; 
        }

        /* GIẤY RỘNG SÁT MÉP - LỀ 1CM */
        .paper-zone { width: 100%; display: flex; justify-content: center; padding: 20px 0; }
        #paper { 
            background: #f4f1ea; 
            width: calc(100% - 40px) !important; 
            max-width: 1400px; 
            min-height: 600px; 
            height: auto !important; 
            padding: 40px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            outline: none; font-size: 24px; line-height: 1.6; 
            white-space: pre-wrap; word-wrap: break-word; color: #333;
        }

        /* BÀN PHÍM CỐ ĐỊNH 40VH */
        .kb-fixed { 
            background: #111; 
            position: fixed; 
            bottom: 0; left: 0; width: 100%; 
            height: 40vh !important; 
            padding: 10px 10px 20px 10px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; 
            box-shadow: 0 -10px 50px rgba(0,0,0,0.8);
        }

        /* THANH ĐỊNH DẠNG CHỮ BỰ */
        .toolbar { 
            display: flex; 
            justify-content: space-between; 
            gap: 10px; 
            margin-bottom: 15px; 
            width: 98% !important;
        }
        .tool-btn {
            flex: 1;
            height: 55px !important;
            background: #222; color: white; border: none;
            border-radius: 10px; cursor: pointer; font-weight: bold; 
            font-size: 22px !important;
            box-shadow: 0 4px 0 #000;
            transition: all 0.1s;
        }
        .tool-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; background: #ff88aa; color: #000; }

        /* TRẢI ĐẦY 100% CHIỀU NGANG */
        .row { 
            display: flex; 
            justify-content: center; 
            margin: 6px 0 !important; 
            gap: 12px !important; 
            width: 100% !important; 
        }

        /* HIỆU ỨNG PHÍM NỔI 3D MÁY ĐÁNH CHỮ */
        .key { 
            flex: 1; 
            height: 80px !important; /* Độ cao vuông vức */
            background: linear-gradient(145deg, #444, #222); /* Màu gradient tạo độ bóng */
            color: white; 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
            font-weight: bold; font-size: 28px !important; 
            user-select: none; -webkit-tap-highlight-color: transparent;
            
            /* Đổ bóng 3 tầng để phím "nổi" lên khỏi khung đen */
            border: 1px solid #555;
            box-shadow: 
                0 6px 0 #000,              /* Cạnh dưới phím */
                0 8px 15px rgba(0,0,0,0.5), /* Bóng đổ xuống nền */
                inset 0 2px 2px rgba(255,255,255,0.1); /* Độ bóng bề mặt */
            
            transition: all 0.05s;
        }

        /* Hiệu ứng khi nhấn: Phím lún xuống thật sự */
        .key:active { 
            transform: translateY(4px); 
            box-shadow: 
                0 2px 0 #000, 
                0 4px 10px rgba(0,0,0,0.5); 
            background: #111;
        }

        /* NÚT CHỨC NĂNG CÂN ĐỐI */
        .wide { flex: 1.5 !important; font-size: 18px !important; background: #333; }
        .space { flex: 4 !important; }
        .enter { flex: 2.5 !important; background: #e67e22 !important; box-shadow: 0 6px 0 #8e44ad; }
        .save { flex: 1.5 !important; background: #27ae60 !important; box-shadow: 0 6px 0 #1e8449; }
    </style>
</head>
<body>
    <div class="paper-zone"><div id="paper" contenteditable="true" spellcheck="false"></div></div>
    
    <div class="kb-fixed">
        <div class="toolbar">
            <button class="tool-btn" onclick="format('bold')" style="border-left: 6px solid #f1c40f;">B</button>
            <button class="tool-btn" onclick="format('italic')" style="font-style: italic; border-left: 6px solid #3498db;">I</button>
            <button class="tool-btn" onclick="format('underline')" style="text-decoration: underline; border-left: 6px solid #9b59b6;">U</button>
        </div>
        <div id="kb-inner" style="width:100%"></div>
    </div>

    <script>
        const paper = document.getElementById('paper');
        const kbInner = document.getElementById('kb-inner');
        let isNum = false; let isCaps = false;

        function format(cmd) {
            document.execCommand(cmd, false, null);
            paper.focus();
        }

        const layouts = {
            abc: [['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['z','x','c','v','b','n','m','⌫']],
            num: [['1','2','3','4','5','6','7','8','9','0'],['!','@','#','$','%','^','&','*','(',')'],['-','/',':',';','?','.',',','+','=','⌫']]
        };

        function render() {
            kbInner.innerHTML = '';
            const rows = isNum ? layouts.num : layouts.abc;
            rows.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'row';
                row.forEach(k => {
                    const btn = document.createElement('div'); btn.className = `key ${k === '⌫' ? 'wide' : ''}`;
                    btn.innerText = (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
                    const press = (e) => { e.preventDefault(); handle(k); };
                    btn.addEventListener('touchstart', press, {passive: false});
                    btn.addEventListener('mousedown', press);
                    rowDiv.appendChild(btn);
                });
                kbInner.appendChild(rowDiv);
            });
            const foot = document.createElement('div'); foot.className = 'row';
            foot.innerHTML = `<div class="key wide" id="m-btn">${isNum?'ABC':'123'}</div><div class="key wide" id="c-btn">CAPS</div><div class="key space">SPACE</div><div class="key enter">RETURN</div><div class="key save">SAVE</div>`;
            kbInner.appendChild(foot);
            document.getElementById('m-btn').onclick = () => { isNum = !isNum; render(); };
            document.getElementById('c-btn').onclick = () => { isCaps = !isCaps; render(); };
            document.querySelector('.space').onclick = () => handle(' ');
            document.querySelector('.enter').onclick = () => handle('Enter');
            document.querySelector('.save').onclick = () => {
                const blob = new Blob([paper.innerText], {type: 'text/plain'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'typing.txt'; a.click();
            };
        }

        function handle(k) {
            if (k === '⌫') document.execCommand('delete', false, null);
            else if (k === 'Enter') document.execCommand('insertLineBreak');
            else if (k === ' ') document.execCommand('insertText', false, '\u00A0');
            else {
                let char = (isCaps && !isNum && k.length === 1) ? k.toUpperCase() : k;
                document.execCommand('insertText', false, char);
            }
            paper.focus();
            window.scrollTo(0, document.body.scrollHeight);
        }
        window.onload = () => { render(); paper.focus(); };
    </script>
</body>
</html>
